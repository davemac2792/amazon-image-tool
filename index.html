<!DOCTYPE html>
<html>
<head>
  <title>Product Image Prep</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding: 40px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .primary {
      background: #007bff;
      color: white;
    }

    .secondary {
      background: #ccc;
    }

    img {
      margin-top: 20px;
      max-width: 100%;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Product Image Prep</h1>
  <p>Select what you want to do:</p>

  <button class="primary">Main Image (White Background)</button>
  <button class="secondary">Secondary Images</button>

  <br><br>

  <input type="file" id="upload" />

  <br>

  <img id="result" />
</div>

<script>
document.querySelector("#upload").addEventListener("change", async function () {
  const file = this.files[0];

  const formData = new FormData();
  formData.append("image_file", file);

  const response = await fetch("/api/remove-bg", {
    method: "POST",
    body: formData,
  });

  const blob = await response.blob();
  const imageUrl = URL.createObjectURL(blob);

  document.querySelector("#result").src = imageUrl;
});
</script>

</body>
</html>
