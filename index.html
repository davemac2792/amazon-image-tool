<!DOCTYPE html>
<html>
<head>
  <title>Product Image Prep</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding: 40px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .primary {
      background: #0070f3;
      color: white;
    }

    .secondary {
      background: #ddd;
    }

    input {
      margin-top: 20px;
    }

    img {
      max-width: 100%;
      margin-top: 20px;
      border: 1px solid #ddd;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Product Image Prep</h1>

  <p>Select what you want to do:</p>

  <button class="primary" onclick="showMain()">Main Image (White Background)</button>
  <button class="secondary" onclick="showSecondary()">Secondary Images</button>

  <div id="uploadSection" style="display:none;">
    <input type="file" id="fileInput" accept="image/*" />
    <br>
    <p id="status"></p>
    <img id="preview" />
  </div>
</div>

<script>
async function removeBackground(file) {
  const formData = new FormData();
  formData.append("image_file", file);

  const response = await fetch("/api/remove-bg", {
    method: "POST",
    body: formData
  });

  const blob = await response.blob();
  return URL.createObjectURL(blob);
}

function showMain() {
  document.getElementById('uploadSection').style.display = 'block';
}

function showSecondary() {
  document.getElementById('uploadSection').style.display = 'block';
}

document.getElementById('fileInput').addEventListener('change', async function(event) {
  const file = event.target.files[0];

  document.getElementById('status').innerText = "Processing...";
  document.getElementById('preview').src = "";

  const result = await removeBackground(file);

  document.getElementById('status').innerText = "";
  document.getElementById('preview').src = result;
});
</script>

</body>
</html>
